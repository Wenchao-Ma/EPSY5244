<style>
.code-result-tabs {
  margin-top: 0.75rem;
}

.code-result-tabs .nav-tabs {
  margin-bottom: 0.75rem;
}

.code-result-tabs .tab-pane {
  padding-top: 0.25rem;
}
</style>

<script>
window.addEventListener("DOMContentLoaded", function () {
  function setNavCollapsed(isCollapsed) {
    document.body.classList.toggle("nav-collapsed", isCollapsed);
    var toggle = document.getElementById("left-nav-toggle");
    if (toggle) {
      toggle.textContent = isCollapsed ? "☰" : "✕";
      toggle.setAttribute("aria-label", isCollapsed ? "Show chapter navigation" : "Hide chapter navigation");
      toggle.title = isCollapsed ? "Show chapter navigation" : "Hide chapter navigation";
    }
  }

  if (window.matchMedia("(min-width: 992px)").matches) {
    if (!document.getElementById("left-nav-toggle")) {
      var navToggle = document.createElement("button");
      navToggle.id = "left-nav-toggle";
      navToggle.type = "button";
      navToggle.textContent = "☰";
      navToggle.setAttribute("aria-label", "Show chapter navigation");
      navToggle.addEventListener("click", function () {
        setNavCollapsed(!document.body.classList.contains("nav-collapsed"));
      });
      document.body.appendChild(navToggle);
    }
    setNavCollapsed(true);
  }

  var cells = document.querySelectorAll("div.cell");
  var counter = 0;

  cells.forEach(function (cell) {
    var codeNode = cell.querySelector(":scope > .cell-code") || cell.querySelector(":scope > .sourceCode");
    var outputNodes = Array.from(cell.children).filter(function (child) {
      return Array.from(child.classList).some(function (cls) {
        return cls.indexOf("cell-output") === 0;
      });
    });

    if (!codeNode || outputNodes.length === 0) {
      return;
    }

    counter += 1;
    var resultId = "result-tab-" + counter;
    var codeId = "code-tab-" + counter;

    var wrapper = document.createElement("div");
    wrapper.className = "code-result-tabs";

    var nav = document.createElement("ul");
    nav.className = "nav nav-tabs";
    nav.setAttribute("role", "tablist");

    var resultNav = document.createElement("li");
    resultNav.className = "nav-item";
    resultNav.setAttribute("role", "presentation");
    var resultBtn = document.createElement("button");
    resultBtn.className = "nav-link active";
    resultBtn.type = "button";
    resultBtn.setAttribute("data-bs-toggle", "tab");
    resultBtn.setAttribute("data-bs-target", "#" + resultId);
    resultBtn.setAttribute("role", "tab");
    resultBtn.setAttribute("aria-controls", resultId);
    resultBtn.setAttribute("aria-selected", "true");
    resultBtn.textContent = "Results";
    resultNav.appendChild(resultBtn);

    var codeNav = document.createElement("li");
    codeNav.className = "nav-item";
    codeNav.setAttribute("role", "presentation");
    var codeBtn = document.createElement("button");
    codeBtn.className = "nav-link";
    codeBtn.type = "button";
    codeBtn.setAttribute("data-bs-toggle", "tab");
    codeBtn.setAttribute("data-bs-target", "#" + codeId);
    codeBtn.setAttribute("role", "tab");
    codeBtn.setAttribute("aria-controls", codeId);
    codeBtn.setAttribute("aria-selected", "false");
    codeBtn.textContent = "Code";
    codeNav.appendChild(codeBtn);

    nav.appendChild(resultNav);
    nav.appendChild(codeNav);

    var content = document.createElement("div");
    content.className = "tab-content";

    var resultPane = document.createElement("div");
    resultPane.className = "tab-pane fade show active";
    resultPane.id = resultId;
    resultPane.setAttribute("role", "tabpanel");

    var codePane = document.createElement("div");
    codePane.className = "tab-pane fade";
    codePane.id = codeId;
    codePane.setAttribute("role", "tabpanel");

    outputNodes.forEach(function (node) {
      resultPane.appendChild(node);
    });

    codePane.appendChild(codeNode);

    content.appendChild(resultPane);
    content.appendChild(codePane);

    wrapper.appendChild(nav);
    wrapper.appendChild(content);

    cell.insertBefore(wrapper, cell.firstChild);
  });
});
</script>
